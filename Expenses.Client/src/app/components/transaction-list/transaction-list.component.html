<table>
    <thead>
        <tr>
        <th>Type</th>
        <th>Amount</th>
        <th>Category</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let transaction of transactions">
        <td>{{ transaction.type }}</td>
        <td>{{ transaction.amount | currency }}</td>
        <td>{{ transaction.category }}</td>
        </tr>
    </tbody>
</table>
